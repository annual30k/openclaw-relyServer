services:
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: pocketclaw-relay-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pocketclaw_relay
      MYSQL_USER: pocketclaw
      MYSQL_PASSWORD: pocketclaw123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  relay-api:
    build:
      context: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      JWT_SECRET: change-me
      DATA_DIR: /app/.data
      DATABASE_URL: mysql://pocketclaw:pocketclaw123@mysql:3306/pocketclaw_relay
      ACCESS_CODE_TTL_SECONDS: 300
      HEARTBEAT_INTERVAL_MS: 30000
      WS_IDLE_TIMEOUT_MS: 70000
      APPROVAL_TTL_SECONDS: 300
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
    volumes:
      - relay-data:/app/.data

volumes:
  mysql-data:
  relay-data:
